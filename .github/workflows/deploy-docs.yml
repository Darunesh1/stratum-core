name: Deploy Documentation

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Sets standard permissions needed for direct GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Ensures only one deployment runs at a time to prevent race conditions
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docusaurus site
        run: pnpm --filter website build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Securely bundles and prepares the built files as an internal artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/build

      # Instantly streams the bundle live to the web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
